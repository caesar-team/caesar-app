name: Link Release

on:
  push:
    branches: [main]
    paths:
      - "apps/link/**"
      - "packages/crypto/**"
      - "packages/link-sdk/**"
      - "packages/typescript-config/**"
      - ".github/workflows/link-release.yml"
    tags:
      - "link-v*"
  workflow_dispatch: {}

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/link

jobs:
  build-push:
    runs-on: ubuntu-latest
    # Image build/push targets GitHub (GHCR) with node24 Docker actions — skip on
    # mirrored Gitea runners (older act, no GHCR). CI still runs on both.
    if: ${{ startsWith(github.server_url, 'https://github.com') }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long
            type=ref,event=tag

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/link/server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
